
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Cement Map</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<header>
<h2>S.O. Consulting Pvt Ltd</h2>
<nav>
<a href="index.html">Home</a>
<a href="database.html">Cement Database</a>
<a href="map.html">Global Map</a>
</nav>
</header>

<div id="map"></div>

<script>
var map=L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18,
attribution:'© OpenStreetMap'
}).addTo(map);

fetch('data/cement_plants.json')
.then(r=>r.json())
.then(data=>{
data.forEach(p=>{
L.marker([p.lat,p.lon]).addTo(map)
.bindPopup(p.plant + "<br>" + p.company + "<br>" + p.country);
});
});
</script>

</body>
</html>
