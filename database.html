
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cement Database</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h2>S.O. Consulting Pvt Ltd</h2>
<nav>
<a href="index.html">Home</a>
<a href="database.html">Cement Database</a>
<a href="map.html">Global Map</a>
</nav>
</header>

<section class="section">
<h2>Global Cement Plants</h2>
<input id="search" placeholder="Search plant/company/country">

<table id="table">
<tr><th>Plant</th><th>Company</th><th>Country</th><th>Capacity</th></tr>
</table>
</section>

<script>
fetch('data/cement_plants.json')
.then(r=>r.json())
.then(data=>{
let table=document.getElementById("table");
data.forEach(p=>{
let row=`<tr><td>${p.plant}</td><td>${p.company}</td><td>${p.country}</td><td>${p.capacity}</td></tr>`;
table.innerHTML+=row;
});
});

const search=document.getElementById("search");
search.addEventListener("keyup",function(){
let filter=search.value.toLowerCase();
document.querySelectorAll("#table tr").forEach(r=>{
let text=r.innerText.toLowerCase();
r.style.display=text.includes(filter)? "":"none";
});
});
</script>

</body>
</html>
